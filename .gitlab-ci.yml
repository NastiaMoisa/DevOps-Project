stages:
  - validate
  - docker
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2
  COMMUNICATION_CONTROL_IMAGE: $CI_REGISTRY_IMAGE/communication-control
  HIVE_MIND_IMAGE: $CI_REGISTRY_IMAGE/hive-mind
  MAP_CLIENT_IMAGE: $CI_REGISTRY_IMAGE/map-client

backend-build:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - cd src/CommunicationControl
    - dotnet restore DevOpsProject.sln
    - dotnet build DevOpsProject.sln -c Release --no-restore

frontend-build:
  stage: validate
  image: node:22-alpine
  script:
    - cd src/MapClient
    - npm install
    - npm run build

docker-images:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_REF_SLUG}"
    - docker build -t "$COMMUNICATION_CONTROL_IMAGE:$IMAGE_TAG" -f src/CommunicationControl/DevOpsProject/Dockerfile src/CommunicationControl
    - docker build -t "$HIVE_MIND_IMAGE:$IMAGE_TAG" -f src/CommunicationControl/DevOpsProject.HiveMind.API/Dockerfile src/CommunicationControl
    - docker build -t "$MAP_CLIENT_IMAGE:$IMAGE_TAG" -f src/MapClient/Dockerfile src/MapClient
    - docker push "$COMMUNICATION_CONTROL_IMAGE:$IMAGE_TAG"
    - docker push "$HIVE_MIND_IMAGE:$IMAGE_TAG"
    - docker push "$MAP_CLIENT_IMAGE:$IMAGE_TAG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$COMMUNICATION_CONTROL_IMAGE:$IMAGE_TAG" "$COMMUNICATION_CONTROL_IMAGE:latest"
        docker tag "$HIVE_MIND_IMAGE:$IMAGE_TAG" "$HIVE_MIND_IMAGE:latest"
        docker tag "$MAP_CLIENT_IMAGE:$IMAGE_TAG" "$MAP_CLIENT_IMAGE:latest"
        docker push "$COMMUNICATION_CONTROL_IMAGE:latest"
        docker push "$HIVE_MIND_IMAGE:latest"
        docker push "$MAP_CLIENT_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

deploy-vps:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
  script:
    - mkdir -p deploy-package/deployment/compose
    - cp docker-compose.prod.yml deploy-package/docker-compose.prod.yml
    - cp deployment/compose/map-client.config.json deploy-package/deployment/compose/map-client.config.json
    - cp scripts/deploy-vps.sh deploy-package/deploy-vps.sh
    - |
      cat > deploy-package/.env <<EOF
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE
      IMAGE_TAG=${CI_COMMIT_TAG:-$CI_COMMIT_REF_SLUG}
      PUBLIC_API_URL=${PUBLIC_API_URL:-http://$VPS_HOST:8080/api/v1/client}
      GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      EOF
    - scp -r deploy-package/* "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"
    - |
      ssh "$VPS_USER@$VPS_HOST" "
      cd $VPS_APP_DIR &&
      chmod +x deploy-vps.sh &&
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE IMAGE_TAG=${CI_COMMIT_TAG:-$CI_COMMIT_REF_SLUG} ./deploy-vps.sh
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  environment:
    name: production
